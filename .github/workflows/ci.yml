name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore NFeSchemaDownloader.slnx

    - name: Build
      run: dotnet build NFeSchemaDownloader.slnx --configuration Release --no-restore

    - name: Install Playwright Browsers
      run: pwsh NFeSchemaDownloader.Cli/bin/Release/net10.0/playwright.ps1 install chromium

    - name: Test
      run: |
        dotnet test NFeSchemaDownloader.Tests/NFeSchemaDownloader.Tests.csproj \
          --configuration Release \
          --no-build \
          --verbosity detailed \
          --logger "console;verbosity=detailed" \
          --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: NFeSchemaDownloader.Tests/TestResults/test-results.trx
