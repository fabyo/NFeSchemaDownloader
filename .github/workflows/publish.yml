name: Publish NuGet

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 1' # At 08:00 on Monday
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and install Playwright
        run: |
          dotnet build NFeSchemaDownloader.Cli/NFeSchemaDownloader.Cli.csproj -c Release
          pwsh NFeSchemaDownloader.Cli/bin/Release/net10.0/playwright.ps1 install chromium

      - name: Run Scraper
        run: dotnet run --project NFeSchemaDownloader.Cli/NFeSchemaDownloader.Cli.csproj -c Release

      - name: Commit, Bump Version and Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add schemas/
          if git diff-index --quiet HEAD; then
            echo "No new schemas downloaded. Creating keep-alive commit to prevent workflow suspension."
            git commit --allow-empty -m "chore: keep-alive workflow to prevent suspension"
            git push origin HEAD
          else
            # Extract current version from csproj
            CURRENT_VERSION=$(grep -oP '(?<=<Version>)[^<]+' NFeSchemaDownloader/NFeSchemaDownloader.csproj)
            
            # Bump patch version
            IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT_VERSION"
            NEW_PATCH=$((${VERSION_PARTS[2]} + 1))
            NEW_VERSION="${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.$NEW_PATCH"
            
            echo "Bumping version from $CURRENT_VERSION to $NEW_VERSION"
            
            # Get modified/added schemas
            DATE=$(date +'%Y-%m-%d')
            NEW_FILES_LIST=$(git ls-files --others --modified schemas/v4/ | sed 's/schemas\/v4\///' | awk '{print "- " $0}')
            
            # Update CHANGELOG.md (inserts the new release info right after ## [Unreleased])
            awk -v ver="## [$NEW_VERSION] - $DATE" -v changes="### Updated Schemas\n$NEW_FILES_LIST\n" '/^## \[Unreleased\]/{print; print ""; print ver; print changes; next}1' CHANGELOG.md > temp_cl.md && mv temp_cl.md CHANGELOG.md
            
            # Update csproj
            sed -i "s/<Version>$CURRENT_VERSION<\/Version>/<Version>$NEW_VERSION<\/Version>/" NFeSchemaDownloader/NFeSchemaDownloader.csproj
            
            # Commit files
            git add NFeSchemaDownloader/NFeSchemaDownloader.csproj CHANGELOG.md
            git commit -m "chore: auto-update schemas and bump version to v$NEW_VERSION"
            git push origin HEAD
            
            # Create GitHub Release
            gh release create v$NEW_VERSION --title "Release v$NEW_VERSION" --notes "Atualização automática dos pacotes XSD da SEFAZ."
            
            # Export the new version for the next steps
            echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          fi

      - name: Pack NuGet
        if: env.NEW_VERSION != ''
        run: dotnet pack NFeSchemaDownloader/NFeSchemaDownloader.csproj -c Release -o ./artifacts /p:Version=${{ env.NEW_VERSION }}

      - name: NuGet Login
        if: env.NEW_VERSION != ''
        uses: NuGet/login@v1
        id: login
        with:
          user: fabyoguima

      - name: Push to NuGet
        if: env.NEW_VERSION != ''
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
