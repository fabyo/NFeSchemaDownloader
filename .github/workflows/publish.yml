name: Publish NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and Test
        run: |
          dotnet build -c Release
          pwsh NFeSchemaDownloader.Cli/bin/Release/net10.0/playwright.ps1 install chromium
          dotnet test -c Release --no-build

      - name: Pack NuGet
        run: dotnet pack NFeSchemaDownloader/NFeSchemaDownloader.csproj -c Release -o ./artifacts

      - name: NuGet Login
        uses: NuGet/login@v1
        id: login
        with:
          user: fabyoguima

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
